name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  smoke-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify package syntax
        run: python -m compileall research_agent

      - name: Verify CLI entrypoint
        run: python -m research_agent.cli --help
